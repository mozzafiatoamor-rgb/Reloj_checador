<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f1a">
<title>Mozzafiato - Reloj Checador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--card:#141d2b;--card2:#1c2737;--accent:#00b894;--accent2:#00a884;--red:#f87171;--yellow:#fbbf24;--text:#e8e8f0;--text2:#8892a4;--radius:16px;--radius-sm:10px}
html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* Clock screen */
.clock-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.clock-time{font-size:72px;font-weight:700;letter-spacing:-2px;font-variant-numeric:tabular-nums;line-height:1}
.clock-date{font-size:15px;color:var(--text2);margin-top:8px;text-transform:capitalize}
.clock-status{display:flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;color:var(--text2)}
.clock-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
.clock-dot.ok{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-registrar{margin-top:32px;padding:20px 48px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 24px rgba(0,184,148,.3);transition:transform .15s}
.btn-registrar:active{transform:scale(.95)}
.pending-badge{margin-top:16px;padding:8px 16px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);border-radius:var(--radius-sm);font-size:12px;color:var(--yellow);display:flex;align-items:center;gap:6px}

/* Employee grid */
.emp-screen{flex:1;display:flex;flex-direction:column;overflow:hidden}
.emp-header{padding:16px 20px;display:flex;align-items:center;gap:12px}
.emp-back{background:var(--card);border:none;color:var(--text);width:40px;height:40px;border-radius:var(--radius-sm);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emp-title{font-size:18px;font-weight:700}
.emp-grid{flex:1;overflow-y:auto;padding:0 16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;-webkit-overflow-scrolling:touch}
.emp-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s}
.emp-card:active{transform:scale(.96)}
.emp-card .avatar{width:48px;height:48px;border-radius:14px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;margin:0 auto 10px}
.emp-card .name{font-size:14px;font-weight:600;line-height:1.2}
.emp-card .role{font-size:11px;color:var(--text2);margin-top:4px}

/* PIN screen */
.pin-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.pin-user{font-size:16px;font-weight:600;margin-bottom:6px}
.pin-label{font-size:13px;color:var(--text2);margin-bottom:20px}
.pin-dots{display:flex;gap:10px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--text2);transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.pin-dot.wrong{background:var(--red);border-color:var(--red);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-key{width:72px;height:72px;border-radius:50%;background:var(--card);border:none;color:var(--text);font-size:24px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.pin-key:active{transform:scale(.9);background:var(--card2)}
.pin-key.del{font-size:18px;color:var(--text2)}

/* Camera screen */
.cam-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}
.cam-preview{width:200px;height:200px;border-radius:50%;overflow:hidden;border:4px solid var(--accent);margin-bottom:20px;position:relative}
.cam-preview video{width:100%;height:100%;object-fit:cover}
.cam-countdown{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.5);z-index:2}
.cam-label{font-size:14px;color:var(--text2)}

/* Success screen */
.success-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.success-icon{font-size:64px;margin-bottom:16px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-msg{font-size:18px;font-weight:700;margin-bottom:8px}
.success-detail{font-size:14px;color:var(--text2);line-height:1.5}
.success-motivation{margin-top:16px;font-size:15px;color:var(--accent);font-weight:600;font-style:italic}

/* Settings */
.settings-screen{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}
.settings-title{font-size:20px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:14px 16px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:monospace}
.form-input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--card);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn+.btn{margin-top:10px}
.info-box{background:var(--card);border-radius:var(--radius-sm);padding:14px;margin-top:20px;font-size:12px;color:var(--text2);line-height:1.6}

/* Floating settings button */
.fab-settings{position:fixed;bottom:24px;left:20px;width:48px;height:48px;border-radius:50%;background:var(--card);border:1px solid rgba(255,255,255,.06);color:var(--text2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.fab-settings:active{transform:scale(.9)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--accent);color:#fff;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:300;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
.toast.error{background:var(--red)}.toast.show{transform:translateX(-50%) translateY(0)}

canvas{display:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="app"></div>
<canvas id="photoCanvas" width="160" height="160"></canvas>
<script>
/* ============================================================
   MOZZAFIATO — Reloj Checador
   ============================================================ */
var S = {
  screen: 'clock', // clock, employees, pin, camera, success, settings
  sheetId: localStorage.getItem('rc_sheetId') || '',
  apiKey: localStorage.getItem('rc_apiKey') || '',
  scriptUrl: localStorage.getItem('rc_scriptUrl') || '',
  empleados: [],
  empleadosCache: null,
  selectedEmp: null,
  pin: '',
  pinWrong: false,
  countdown: 3,
  lastRegTime: {},
  stream: null
};

/* ---------- Helpers ---------- */
function toast(m, err) {
  var t = document.getElementById('toast');
  t.textContent = (err ? '\u26a0\ufe0f ' : '\u2705 ') + m;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function isConfigured() {
  return S.sheetId && S.apiKey && S.scriptUrl;
}

function getInitials(name) {
  return (name || '?').split(' ').map(function(p) { return p[0]; }).join('').toUpperCase().slice(0, 2);
}

function avatarColor(name) {
  var colors = ['#00b894','#6c5ce7','#fdcb6e','#e17055','#0984e3','#d63031','#00cec9','#e84393'];
  var sum = 0;
  for (var i = 0; i < (name || '').length; i++) sum += name.charCodeAt(i);
  return colors[sum % colors.length];
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function nowTime() {
  var d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

/* ---------- Sheets communication ---------- */
var Sheets = {
  async read(range) {
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + S.sheetId + '/values/' + encodeURIComponent(range) + '?key=' + S.apiKey;
    var r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('Error ' + r.status);
    var d = await r.json();
    return d.values || [];
  },
  async post(payload) {
    var r = await fetch(S.scriptUrl, { method: 'POST', body: JSON.stringify(payload) });
    var d = await r.json();
    if (!d.success) throw new Error(d.error || 'Error del servidor');
    return d;
  }
};

/* ---------- Offline queue ---------- */
var SyncQueue = {
  KEY: 'rc_syncQueue',
  get queue() { try { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); } catch(e) { return []; } },
  set queue(v) { localStorage.setItem(this.KEY, JSON.stringify(v)); },
  processing: false,
  add: function(item) {
    var q = this.queue;
    // Dedup: same employee + same date + same action
    var dominated = q.some(function(existing) {
      return existing.empleadoId === item.empleadoId && existing.fecha === item.fecha;
    });
    if (dominated) {
      // Allow — different time slot registrations are valid
    }
    q.push({ ...item, _ts: Date.now() });
    this.queue = q;
    this.process();
  },
  process: async function() {
    if (this.processing) return;
    var q = this.queue;
    if (!q.length) return;
    this.processing = true;
    var batch = q.splice(0, 10);
    this.queue = q;
    var failed = [];
    for (var i = 0; i < batch.length; i++) {
      try {
        await Sheets.post({
          action: 'registrarAsistencia',
          empleadoId: batch[i].empleadoId,
          nombre: batch[i].nombre,
          fecha: batch[i].fecha,
          hora: batch[i].hora,
          turno: batch[i].turno,
          foto: batch[i].foto || '',
          timestamp: batch[i].timestamp || new Date().toISOString()
        });
      } catch(e) {
        // Network error = retry, logic error = discard
        if (e.message && (e.message.includes('DEDUP') || e.message.includes('COMPLETE'))) {
          // Discard — not a network error
        } else {
          failed.push(batch[i]);
        }
      }
    }
    if (failed.length) {
      this.queue = [...failed, ...this.queue];
    }
    this.processing = false;
    if (this.queue.length) {
      setTimeout(function() { SyncQueue.process(); }, 2000);
    }
    render();
  },
  count: function() { return this.queue.length; },
  clear: function() { localStorage.removeItem(this.KEY); render(); }
};

/* ---------- Load employees ---------- */
async function loadEmpleados() {
  if (!isConfigured()) return;
  try {
    var rows = await Sheets.read('Empleados!A2:J200');
    S.empleados = rows.map(function(r) {
      return {
        id: (r[0] || '').trim(),
        nombre: (r[1] || '').trim(),
        telefono: r[2] || '',
        puesto: (r[3] || '').trim(),
        turno: (r[4] || '').trim(),
        pin: (r[5] || '').trim(),
        salarioSemanal: r[6] || '',
        fechaIngreso: r[7] || '',
        estatus: (r[8] || 'activo').trim().toLowerCase(),
        email: r[9] || ''
      };
    }).filter(function(e) { return e.id && e.estatus === 'activo'; });
    S.empleadosCache = Date.now();
    localStorage.setItem('rc_empCache', JSON.stringify(S.empleados));
  } catch(e) {
    // Use cache
    try {
      var cached = JSON.parse(localStorage.getItem('rc_empCache') || '[]');
      if (cached.length) S.empleados = cached;
    } catch(ex) {}
  }
}

/* ---------- Render ---------- */
function render() {
  var app = document.getElementById('app');
  switch (S.screen) {
    case 'clock':     app.innerHTML = renderClock(); break;
    case 'employees': app.innerHTML = renderEmployees(); break;
    case 'pin':       app.innerHTML = renderPin(); break;
    case 'camera':    app.innerHTML = renderCamera(); break;
    case 'success':   app.innerHTML = renderSuccess(); break;
    case 'settings':  app.innerHTML = renderSettings(); break;
  }
  bindEvents();
}

function renderClock() {
  var d = new Date();
  var time = d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var date = d.toLocaleDateString('es-MX', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  var configured = isConfigured();
  var pending = SyncQueue.count();
  return '<div class="clock-screen">' +
    '<div class="clock-time">' + time + '</div>' +
    '<div class="clock-date">' + date + '</div>' +
    '<div class="clock-status"><div class="clock-dot ' + (configured ? 'ok' : '') + '"></div>' +
    (configured ? 'Conectado' : 'Sin configurar') + '</div>' +
    (configured ? '<button class="btn-registrar" data-action="go-register">Registrar Asistencia</button>' :
      '<button class="btn-registrar" data-action="go-settings" style="background:var(--yellow);color:#000">Configurar</button>') +
    (pending ? '<div class="pending-badge">\u26a0\ufe0f ' + pending + ' registro' + (pending > 1 ? 's' : '') + ' pendiente' + (pending > 1 ? 's' : '') + '</div>' : '') +
    '</div>' +
    '<button class="fab-settings" data-action="go-settings">\u2699\ufe0f</button>';
}

function renderEmployees() {
  var cards = S.empleados.map(function(emp) {
    return '<div class="emp-card" data-action="select-emp" data-id="' + emp.id + '">' +
      '<div class="avatar" style="background:' + avatarColor(emp.nombre) + '">' + getInitials(emp.nombre) + '</div>' +
      '<div class="name">' + emp.nombre + '</div>' +
      '<div class="role">' + emp.puesto + '</div>' +
    '</div>';
  }).join('');
  return '<div class="emp-screen">' +
    '<div class="emp-header"><button class="emp-back" data-action="go-clock">\u2190</button><div class="emp-title">Selecciona tu nombre</div></div>' +
    '<div class="emp-grid">' + (cards || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">No hay empleados activos</div>') + '</div>' +
    '</div>';
}

function renderPin() {
  var emp = S.selectedEmp;
  var dots = '';
  for (var i = 0; i < 6; i++) {
    var cls = i < S.pin.length ? ' filled' : '';
    if (S.pinWrong) cls = ' wrong';
    dots += '<div class="pin-dot' + cls + '"></div>';
  }
  var keys = '';
  for (var n = 1; n <= 9; n++) keys += '<button class="pin-key" data-action="pin-digit" data-val="' + n + '">' + n + '</button>';
  keys += '<button class="pin-key" data-action="go-employees" style="font-size:14px;color:var(--text2)">\u2190</button>';
  keys += '<button class="pin-key" data-action="pin-digit" data-val="0">0</button>';
  keys += '<button class="pin-key del" data-action="pin-delete">\u232b</button>';

  return '<div class="pin-screen">' +
    '<div class="pin-user">' + (emp ? emp.nombre : '') + '</div>' +
    '<div class="pin-label">Ingresa tu PIN de 6 d\u00edgitos</div>' +
    '<div class="pin-dots">' + dots + '</div>' +
    '<div class="pin-pad">' + keys + '</div>' +
    '</div>';
}

function renderCamera() {
  return '<div class="cam-screen">' +
    '<div class="cam-preview"><video id="camVideo" autoplay playsinline muted></video>' +
    '<div class="cam-countdown" id="camCountdown">' + S.countdown + '</div></div>' +
    '<div class="cam-label">Preparando foto...</div>' +
    '</div>';
}

function renderSuccess() {
  var msgs = [
    '\u00a1Hoy cocinamos \u00e9xitos!',
    '\u00a1Mozzafiato cuenta contigo!',
    '\u00a1A darle con todo!',
    '\u00a1Excelente d\u00eda por delante!',
    '\u00a1T\u00fa haces grande a Mozzafiato!',
    '\u00a1La mejor receta eres t\u00fa!',
    '\u00a1Vamos con toda la actitud!',
    '\u00a1Gracias por tu compromiso!'
  ];
  var msg = msgs[Math.floor(Math.random() * msgs.length)];
  return '<div class="success-screen">' +
    '<div class="success-icon">\u2705</div>' +
    '<div class="success-msg">Registro exitoso</div>' +
    '<div class="success-detail">' + (S.selectedEmp ? S.selectedEmp.nombre : '') + ' \u2022 ' + nowTime() + '</div>' +
    '<div class="success-motivation">' + msg + '</div>' +
    '</div>';
}

function renderSettings() {
  var pending = SyncQueue.count();
  return '<div class="settings-screen">' +
    '<div class="settings-title"><button class="emp-back" data-action="go-clock">\u2190</button> Ajustes</div>' +
    '<div class="form-group"><label class="form-label">Sheet ID</label>' +
    '<input class="form-input" id="cfgSheetId" value="' + S.sheetId + '" placeholder="ID del Google Sheet"></div>' +
    '<div class="form-group"><label class="form-label">API Key</label>' +
    '<input class="form-input" id="cfgApiKey" value="' + S.apiKey + '" placeholder="API Key de Google Cloud" type="password"></div>' +
    '<div class="form-group"><label class="form-label">Script URL</label>' +
    '<input class="form-input" id="cfgScriptUrl" value="' + S.scriptUrl + '" placeholder="URL del Web App (Apps Script)"></div>' +
    '<button class="btn btn-primary" data-action="save-settings">\u{1F4BE} Guardar configuraci\u00f3n</button>' +
    '<button class="btn btn-secondary" data-action="test-connection">\u{1F50C} Probar conexi\u00f3n</button>' +
    (pending ? '<button class="btn btn-secondary" data-action="sync-now" style="margin-top:10px">\u{1F504} Sincronizar ahora (' + pending + ')</button>' +
      '<button class="btn btn-danger" data-action="clear-queue" style="margin-top:10px">\u{1F5D1}\ufe0f Limpiar cola (' + pending + ')</button>' : '') +
    '<div class="info-box"><strong>Mozzafiato Reloj Checador</strong><br>v1.0<br><br>' +
    'Empleados cargados: ' + S.empleados.length + '<br>' +
    'Registros pendientes: ' + pending + '<br>' +
    '\u00daltima carga: ' + (S.empleadosCache ? new Date(S.empleadosCache).toLocaleTimeString('es-MX') : 'Nunca') +
    '</div></div>';
}

/* ---------- Event delegation ---------- */
function bindEvents() {
  // Remove old listener and add new one
}

document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.dataset.action;

  switch (action) {
    case 'go-register':
      if (!S.empleados.length) {
        loadEmpleados().then(function() {
          S.screen = 'employees';
          render();
        });
      } else {
        S.screen = 'employees';
        render();
      }
      break;
    case 'go-clock':
      stopCamera();
      S.screen = 'clock';
      S.pin = '';
      S.pinWrong = false;
      S.selectedEmp = null;
      render();
      break;
    case 'go-employees':
      S.screen = 'employees';
      S.pin = '';
      S.pinWrong = false;
      render();
      break;
    case 'go-settings':
      S.screen = 'settings';
      render();
      break;
    case 'select-emp':
      var empId = el.dataset.id;
      S.selectedEmp = S.empleados.find(function(emp) { return emp.id === empId; });
      S.pin = '';
      S.pinWrong = false;
      S.screen = 'pin';
      render();
      break;
    case 'pin-digit':
      if (S.pin.length >= 6) return;
      S.pin += el.dataset.val;
      S.pinWrong = false;
      render();
      if (S.pin.length === 6) {
        setTimeout(validatePin, 200);
      }
      break;
    case 'pin-delete':
      if (S.pin.length > 0) {
        S.pin = S.pin.slice(0, -1);
        S.pinWrong = false;
        render();
      }
      break;
    case 'save-settings':
      saveSettings();
      break;
    case 'test-connection':
      testConnection();
      break;
    case 'sync-now':
      SyncQueue.process();
      toast('Sincronizando...');
      break;
    case 'clear-queue':
      if (confirm('\u00bfDescartar ' + SyncQueue.count() + ' registros pendientes?')) {
        SyncQueue.clear();
        toast('Cola limpiada');
      }
      break;
  }
});

/* ---------- PIN validation ---------- */
function validatePin() {
  if (!S.selectedEmp) return;
  if (S.pin === S.selectedEmp.pin) {
    S.screen = 'camera';
    render();
    startCamera();
  } else {
    S.pinWrong = true;
    render();
    setTimeout(function() {
      S.pin = '';
      S.pinWrong = false;
      render();
    }, 800);
  }
}

/* ---------- Camera ---------- */
var cameraStream = null;

async function startCamera() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 320 } },
      audio: false
    });
    cameraStream = stream;
    var video = document.getElementById('camVideo');
    if (video) {
      video.srcObject = stream;
    }
    // Start countdown
    S.countdown = 3;
    updateCountdown();
    var interval = setInterval(function() {
      S.countdown--;
      if (S.countdown <= 0) {
        clearInterval(interval);
        capturePhoto();
      } else {
        updateCountdown();
      }
    }, 1000);
  } catch(e) {
    // Camera denied — proceed without photo
    toast('Sin acceso a c\u00e1mara', true);
    doRegistro('');
  }
}

function updateCountdown() {
  var el = document.getElementById('camCountdown');
  if (el) el.textContent = S.countdown;
}

function capturePhoto() {
  var video = document.getElementById('camVideo');
  var canvas = document.getElementById('photoCanvas');
  if (!video || !canvas) {
    doRegistro('');
    return;
  }
  var ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, 160, 160);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.3);
  stopCamera();
  doRegistro(dataUrl);
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(function(t) { t.stop(); });
    cameraStream = null;
  }
}

/* ---------- Register attendance ---------- */
async function doRegistro(foto) {
  var emp = S.selectedEmp;
  if (!emp) return;

  var fecha = todayStr();
  var hora = nowTime();
  var timestamp = new Date().toISOString();

  var payload = {
    action: 'registrarAsistencia',
    empleadoId: emp.id,
    nombre: emp.nombre,
    fecha: fecha,
    hora: hora,
    turno: emp.turno,
    foto: foto,
    timestamp: timestamp
  };

  // Show success immediately
  S.screen = 'success';
  render();

  // Try to send
  try {
    if (!isConfigured()) throw new Error('No configurado');
    await Sheets.post(payload);
  } catch(e) {
    // Queue for later
    SyncQueue.add({
      empleadoId: emp.id,
      nombre: emp.nombre,
      fecha: fecha,
      hora: hora,
      turno: emp.turno,
      foto: foto,
      timestamp: timestamp
    });
    if (e.message && !e.message.includes('DEDUP') && !e.message.includes('COMPLETE')) {
      // Network error — queued silently
    } else if (e.message) {
      toast(e.message, true);
    }
  }

  // Return to clock after 3 seconds
  setTimeout(function() {
    S.screen = 'clock';
    S.pin = '';
    S.selectedEmp = null;
    render();
  }, 3000);
}

/* ---------- Settings ---------- */
function saveSettings() {
  var sheetId = document.getElementById('cfgSheetId').value.trim();
  var apiKey = document.getElementById('cfgApiKey').value.trim();
  var scriptUrl = document.getElementById('cfgScriptUrl').value.trim();
  S.sheetId = sheetId;
  S.apiKey = apiKey;
  S.scriptUrl = scriptUrl;
  localStorage.setItem('rc_sheetId', sheetId);
  localStorage.setItem('rc_apiKey', apiKey);
  localStorage.setItem('rc_scriptUrl', scriptUrl);
  toast('Configuraci\u00f3n guardada');
  loadEmpleados();
}

async function testConnection() {
  if (!isConfigured()) {
    toast('Configura primero los 3 campos', true);
    return;
  }
  try {
    // Use metadata endpoint — works even on empty/fresh sheets
    var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + S.sheetId + '?key=' + S.apiKey + '&fields=spreadsheetId,properties.title';
    var r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var meta = await r.json();
    toast('Conectado a: ' + (meta.properties ? meta.properties.title : 'Sheet'));
    // Try loading employees too
    await loadEmpleados();
    if (S.empleados.length > 0) {
      toast('Conectado. ' + S.empleados.length + ' empleados cargados');
    } else {
      toast('Conectado, pero sin empleados. Inicializa el sistema desde el panel de n\u00f3mina.');
    }
  } catch(e) {
    toast('Error de conexi\u00f3n: ' + e.message, true);
  }
}

/* ---------- Clock tick ---------- */
setInterval(function() {
  if (S.screen === 'clock') {
    var el = document.querySelector('.clock-time');
    if (el) {
      var d = new Date();
      el.textContent = d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
  }
}, 1000);

/* ---------- Auto-reload employees every 10 min ---------- */
setInterval(function() {
  if (isConfigured()) loadEmpleados();
}, 600000);

/* ---------- Auto-sync queue every 5 min ---------- */
setInterval(function() {
  if (isConfigured() && SyncQueue.count() > 0) {
    SyncQueue.process();
  }
}, 300000);

/* ---------- Init ---------- */
(async function init() {
  if (isConfigured()) {
    await loadEmpleados();
  }
  render();
})();
</script>
